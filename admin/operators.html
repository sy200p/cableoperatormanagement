<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Operators</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen pb-24">
  <div class="max-w-lg mx-auto">
    <header class="bg-white px-5 py-4 flex items-center gap-3 border-b border-gray-100 sticky top-0 z-10">
      <button onclick="window.location.href='dashboard.html'" class="text-gray-600"><i class="fas fa-arrow-left text-lg"></i></button>
      <div>
        <h1 class="text-lg font-bold text-gray-800">Operators</h1>
        <p class="text-xs text-gray-500">All LCOs in system</p>
      </div>
      <div class="ml-auto">
        <button onclick="openAddModal()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-medium shadow-lg shadow-blue-200">
          <i class="fas fa-plus mr-1"></i> Add
        </button>
      </div>
    </header>

    <div class="px-4 py-4">
      <div class="flex gap-2 mb-4 overflow-x-auto pb-1">
        <button class="px-4 py-2 bg-blue-600 text-white rounded-full text-xs font-medium whitespace-nowrap" onclick="filterOperators('all')" id="filterAll">All</button>
        <button class="px-4 py-2 bg-white text-gray-600 rounded-full text-xs font-medium border border-gray-200 whitespace-nowrap" onclick="filterOperators('active')" id="filterActive">Active</button>
        <button class="px-4 py-2 bg-white text-gray-600 rounded-full text-xs font-medium border border-gray-200 whitespace-nowrap" onclick="filterOperators('inactive')" id="filterInactive">Inactive</button>
      </div>

      <div class="space-y-3" id="operatorList"></div>
    </div>
  </div>

  <div id="addModalOverlay" class="fixed inset-0 bg-black/40 z-20 hidden" onclick="closeAddModal()"></div>
  <div id="addModal" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-3xl z-30 transform translate-y-full transition-all duration-300 max-w-lg mx-auto shadow-2xl">
    <div class="p-5">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg font-bold text-gray-800">Add New Operator</h2>
        <button onclick="closeAddModal()" class="text-gray-400"><i class="fas fa-times"></i></button>
      </div>
      <div class="space-y-3">
        <div>
          <label class="text-xs font-medium text-gray-600 block mb-1">Operator Name</label>
          <input type="text" id="opName" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Full name">
        </div>
        <div>
          <label class="text-xs font-medium text-gray-600 block mb-1">LCO ID</label>
          <input type="text" id="opId" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. LCO009">
        </div>
        <div>
          <label class="text-xs font-medium text-gray-600 block mb-1">Area</label>
          <input type="text" id="opArea" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Sector / Area name">
        </div>
        <div>
          <label class="text-xs font-medium text-gray-600 block mb-1">Partnership Rate (₹)</label>
          <input type="number" id="opRate" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. 130" value="130">
        </div>
        <button onclick="addOperator()" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-semibold text-sm mt-2">Add Operator</button>
      </div>
    </div>
  </div>

  <div id="deleteModalOverlay" class="fixed inset-0 bg-black/40 z-20 hidden" onclick="closeDeleteModal()"></div>
  <div id="deleteModal" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-3xl z-30 transform translate-y-full transition-all duration-300 max-w-lg mx-auto shadow-2xl">
    <div class="p-5">
      <div class="text-center mb-5">
        <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-3">
          <i class="fas fa-exclamation-triangle text-red-500 text-xl"></i>
        </div>
        <h2 class="text-lg font-bold text-gray-800">Delete Operator?</h2>
        <p class="text-sm text-gray-500 mt-1">All boxes under this operator will be <span class="text-red-500 font-semibold">auto-deactivated</span>. Historical payment data will be retained.</p>
      </div>
      <div class="bg-gray-50 rounded-xl p-3 mb-4" id="deleteInfo">
        <p class="text-sm font-medium text-gray-800" id="deleteName">-</p>
        <p class="text-xs text-gray-500" id="deleteId">-</p>
      </div>
      <div class="flex gap-3">
        <button onclick="closeDeleteModal()" class="flex-1 py-3.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600">Cancel</button>
        <button onclick="confirmDelete()" class="flex-1 py-3.5 bg-red-500 text-white rounded-xl text-sm font-medium">Delete</button>
      </div>
    </div>
  </div>

  <script>
    let operators = [
      { id: 'LCO001', name: 'Ramesh Sharma', area: 'Sector 7', boxes: 52, active: 48, inactive: 4, rate: 130, status: 'active', joinDate: '2024-01-15' },
      { id: 'LCO002', name: 'Suresh Patel', area: 'Sector 12', boxes: 68, active: 61, inactive: 7, rate: 140, status: 'active', joinDate: '2024-03-20' },
      { id: 'LCO003', name: 'Amit Verma', area: 'Sector 4', boxes: 45, active: 40, inactive: 5, rate: 135, status: 'active', joinDate: '2024-06-01' },
      { id: 'LCO004', name: 'Vikram Singh', area: 'Sector 9', boxes: 71, active: 65, inactive: 6, rate: 150, status: 'active', joinDate: '2024-09-10' },
      { id: 'LCO005', name: 'Pankaj Gupta', area: 'Sector 3', boxes: 38, active: 32, inactive: 6, rate: 125, status: 'active', joinDate: '2024-12-01' },
      { id: 'LCO006', name: 'Deepak Yadav', area: 'Sector 15', boxes: 28, active: 22, inactive: 6, rate: 120, status: 'active', joinDate: '2025-02-15' },
      { id: 'LCO007', name: 'Rajesh Kumar', area: 'Sector 8', boxes: 22, active: 18, inactive: 4, rate: 130, status: 'active', joinDate: '2025-04-01' },
      { id: 'LCO008', name: 'Manoj Tiwari', area: 'Sector 11', boxes: 18, active: 12, inactive: 6, rate: 125, status: 'inactive', joinDate: '2025-05-10' }
    ];

    let currentFilter = 'all';
    let deleteTarget = null;

    function renderOperators() {
      const filtered = currentFilter === 'all' ? operators : operators.filter(o => o.status === currentFilter);
      const list = document.getElementById('operatorList');
      list.innerHTML = filtered.map(op => `
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3 flex-1" onclick="window.location.href='operator-detail.html?id=${op.id}'">
              <div class="w-10 h-10 ${op.status === 'active' ? 'bg-blue-100' : 'bg-gray-100'} rounded-xl flex items-center justify-center ${op.status === 'active' ? 'text-blue-600' : 'text-gray-500'} font-bold text-sm">${op.name.charAt(0)}</div>
              <div>
                <p class="text-sm font-semibold text-gray-800">${op.name}</p>
                <p class="text-xs text-gray-500">${op.area} · ${op.id}</p>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <span class="px-2.5 py-1 ${op.status === 'active' ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-500'} rounded-full text-xs font-medium">${op.status === 'active' ? 'Active' : 'Inactive'}</span>
              ${op.status === 'active' ? `<button onclick="event.stopPropagation(); openDeleteModal('${op.id}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash-alt text-sm"></i></button>` : ''}
            </div>
          </div>
          <div class="flex gap-4 mt-3 pt-3 border-t border-gray-50">
            <div class="flex-1 text-center"><p class="text-xs text-gray-400">Total</p><p class="text-sm font-bold text-gray-700">${op.boxes}</p></div>
            <div class="flex-1 text-center"><p class="text-xs text-gray-400">Active</p><p class="text-sm font-bold text-green-600">${op.active}</p></div>
            <div class="flex-1 text-center"><p class="text-xs text-gray-400">Inactive</p><p class="text-sm font-bold text-red-500">${op.inactive}</p></div>
            <div class="flex-1 text-center"><p class="text-xs text-gray-400">Rate</p><p class="text-sm font-bold text-blue-600">₹${op.rate}</p></div>
          </div>
        </div>
      `).join('');
    }

    function filterOperators(filter) {
      currentFilter = filter;
      ['All', 'Active', 'Inactive'].forEach(f => {
        const btn = document.getElementById('filter' + f);
        const fLower = f.toLowerCase();
        if (fLower === filter) {
          btn.className = 'px-4 py-2 bg-blue-600 text-white rounded-full text-xs font-medium whitespace-nowrap';
        } else {
          btn.className = 'px-4 py-2 bg-white text-gray-600 rounded-full text-xs font-medium border border-gray-200 whitespace-nowrap';
        }
      });
      renderOperators();
    }

    function openAddModal() {
      document.getElementById('addModal').classList.remove('translate-y-full');
      document.getElementById('addModalOverlay').classList.remove('hidden');
    }

    function closeAddModal() {
      document.getElementById('addModal').classList.add('translate-y-full');
      document.getElementById('addModalOverlay').classList.add('hidden');
    }

    function addOperator() {
      const name = document.getElementById('opName').value.trim();
      const id = document.getElementById('opId').value.trim();
      const area = document.getElementById('opArea').value.trim();
      const rate = parseInt(document.getElementById('opRate').value) || 130;
      if (!name || !id || !area) { alert('Please fill all fields'); return; }
      operators.push({ id, name, area, boxes: 0, active: 0, inactive: 0, rate, status: 'active', joinDate: new Date().toISOString().split('T')[0] });
      closeAddModal();
      document.getElementById('opName').value = '';
      document.getElementById('opId').value = '';
      document.getElementById('opArea').value = '';
      renderOperators();
    }

    function openDeleteModal(id) {
      deleteTarget = operators.find(o => o.id === id);
      if (!deleteTarget) return;
      document.getElementById('deleteName').textContent = deleteTarget.name;
      document.getElementById('deleteId').textContent = deleteTarget.id + ' · ' + deleteTarget.area;
      document.getElementById('deleteModal').classList.remove('translate-y-full');
      document.getElementById('deleteModalOverlay').classList.remove('hidden');
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.add('translate-y-full');
      document.getElementById('deleteModalOverlay').classList.add('hidden');
      deleteTarget = null;
    }

    function confirmDelete() {
      if (!deleteTarget) return;
      const idx = operators.findIndex(o => o.id === deleteTarget.id);
      if (idx > -1) {
        operators[idx].status = 'inactive';
        operators[idx].active = 0;
      }
      closeDeleteModal();
      renderOperators();
    }

    renderOperators();
  </script>
</body>
</html>
